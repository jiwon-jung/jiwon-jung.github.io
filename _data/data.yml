career-profile:
    title: <b>Biography</b>
    summary: |
      I am a Ph.D. student in the <a href="https://www.stat.purdue.edu/" target="_blank"> <b>Department of Statistics</b></a> and <a href="https://sites.google.com/view/purdue-dsf/home?_ga=2.140572466.1831218327.1676400951-544944181.1675815965&pli=1" target="_blank"> <b>Data Science in Finance Research Focus Group </b></a> (advisor: Dr. Kiseop Lee and Dr. Mengyi Xu) at Purdue University since January 2021.  
      My research focuses on as follows:
         <p><b> - Quantitative Finance</b>: Modeling a limit order book dynamics using machine learning; Identifying a lead-lag effect between intraday and overnight returns  <br>  </p>
         <p><b> - Actuarial Sciences</b>: Estimating health transition intensities using a Hawkes process  <br> </p>
         <p><b> - Medical Data Analysis</b>: Identifying cancer region in pathology images using penalized segmentation approach  <br> </p>
 
